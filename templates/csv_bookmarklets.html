<!DOCTYPE html>
<html lang="ja">
<!--
========================================================================
EOL CSV Conversion Bookmarklet - Collection Page
========================================================================

【テンプレート構成】
このファイルは以下のセクションで構成されています:

1. HEAD SECTION (1-10行)
   - メタタグ設定
   - 外部CSS読み込み（Google Fonts, Font Awesome）
   - 将来の分割先: templates/base.html + templates/bookmarklets/csv.html

2. CSS STYLES (10-168行)
   - CSS変数定義（カラースキーム - 青系）
   - ブックマークレットカードのスタイル
   - XREA広告対応（左寄せ強制）
   - 将来の分割先: static/css/main.css + static/css/pages/csv_bookmarklets.css

3. BODY - HEADER & INSTRUCTION (171-181行)
   - ページタイトル
   - 使用方法の説明（EOL専用）
   - 将来の分割先: templates/bookmarklets/csv_header.html

4. BODY - BOOKMARKLET ITEM (183-190行)
   - eol_check ブックマークレット
     - 指定年数分の「通期」データにチェック
     - 「縦形式」に自動設定
   - 将来の分割先: templates/bookmarklets/csv_items.html

5. BODY - NAVIGATION & FOOTER (192-200行)
   - 変換ツールへの戻るリンク
   - フッター（著作権表示）
   - 将来の分割先: templates/components/footer.html

6. JAVASCRIPT - XREA AD HANDLER (203-232行)
   - XREA広告の左寄せ強制スクリプト
   - MutationObserver による動的監視
   - 将来の分割先: static/js/ad_handler.js

【設計思想】
- ブックマークレットをドラッグ&ドロップで追加可能なUI
- EOL（Economic Online）の操作を自動化
- GitHub風の青系カラースキーム
- XREA無料サーバーの広告表示に対応（左寄せ強制）

【ブックマークレット機能】
eol_check:
  - ユーザーに年数を入力させる（デフォルト10年）
  - 「通期」データの行を検索
  - チェックボックス（csv_1, csv_2, csv_6）を自動チェック
  - ダウンロード形式を「縦形式」に設定

【依存関係】
- app.py (Flask Route: csv_bookmarklets)
- Google Fonts (Inter)
- Font Awesome 6.0.0
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV変換用ブックマークレット | 財務データ変換ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- ======================================================================
         CSS STYLES - カラースキーム（青系）、レイアウト、ブックマークレットカード
         【将来の分割先】static/css/main.css + static/css/pages/csv_bookmarklets.css
         ====================================================================== -->
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary-color: #58a6ff;
            --primary-hover: #1f6feb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --card-bg: #0f172a;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .page-wrapper {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 60px 40px;
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: left;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .instruction {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            background: rgba(88, 166, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .bookmarklet-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .bookmarklet-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .bookmarklet-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .bookmarklet-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: left;
        }

        .btn-bookmarklet {
            display: inline-block;
            background: var(--primary-color);
            color: #0d1117;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }

        .btn-bookmarklet:hover {
            background: var(--primary-hover);
            color: white;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .back-link i {
            margin-right: 8px;
        }

        .footer {
            margin-top: 2rem;
            text-align: left;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* XREA Ad Alignment Fixes */
        body>div:first-child,
        body>center:first-child,
        body>div[align="center"]:first-child,
        center,
        div[align="center"],
        div[style*="text-align: center"] {
            text-align: left !important;
            margin-left: 0 !important;
            margin-right: auto !important;
        }

        body>div:first-child,
        body>center:first-child {
            padding-left: 40px !important;
        }

        body>div:first-child img,
        body>center:first-child img,
        iframe[id^="google_ads"],
        div[id^="xrea-ad"] {
            margin-left: 0 !important;
            margin-right: auto !important;
            display: inline-block !important;
        }
    </style>
</head>

<body>
    <!-- ======================================================================
         BODY - ページコンテナ
         ====================================================================== -->
    <div class="page-wrapper">
        <div class="container">
            <!-- ==================================================================
                 HEADER & INSTRUCTION
                 【将来の分割先】templates/bookmarklets/csv_header.html
                 ================================================================== -->
            <div class="header">
                <h1>CSV変換用ブックマークレット</h1>
            </div>

            <div class="instruction">
                下のボタンを、ブラウザの<strong>「ブックマークバー」にドラッグ＆ドロップ</strong>することで追加できます。<br>
                EOLの「原文（財務データCSV）」画面で使用することで、チェックボックスの操作が自動化されます。
            </div>

            <!-- ==================================================================
                 BOOKMARKLET ITEM - eol_check
                 【将来の分割先】templates/bookmarklets/csv_items.html
                 ================================================================== -->
            <div class="bookmarklet-item">
                <div class="bookmarklet-name">eol_check</div>
                <div class="bookmarklet-desc">
                    指定した年数分の「通期」データにチェックを入れ、ダウンロード形式を「縦形式」に自動設定します。
                </div>
                <a class="btn-bookmarklet"
                    href='javascript:(function(){var n=parseInt(prompt("チェックする年数","10"),10)||10,c=0;document.querySelectorAll("tr").forEach(function(tr){if(c>=n)return;var td=tr.querySelector("td:nth-child(2)");if(td&&td.textContent.trim()==="通期"){tr.querySelectorAll("input.csv_1,input.csv_2,input.csv_6").forEach(function(cb){cb.checked=true});c++}});document.querySelectorAll(&#39;input[name="csv_style"][value="vertical"],input[name="xlsx_style"][value="vertical"]&#39;).forEach(function(r){r.checked=true});})();'>eol_check</a>
            </div>

            <!-- ==================================================================
                 NAVIGATION & FOOTER
                 【将来の分割先】templates/components/footer.html
                 ================================================================== -->
            <div style="text-align: left;">
                <a href="{{ url_for('csv_converter') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i> 変換ツールに戻る
                </a>
            </div>

            <div class="footer">
                (c) Makoto Tomo, 2026
            </div>
        </div>
    </div>

    <!-- ======================================================================
         JAVASCRIPT - XREA AD HANDLER
         【将来の分割先】static/js/ad_handler.js
         ====================================================================== -->
    <!-- XREA Ad Alignment Enforcement -->
    <script src="{{ url_for('static', filename='js/xrea_ad_handler.js') }}"></script>
</body>

</html>
