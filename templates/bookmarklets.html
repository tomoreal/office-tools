<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブックマークレットの追加 | XBRL・Excel 変換ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --card-bg: #0f172a;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .page-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .instruction {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .bookmarklet-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .bookmarklet-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .bookmarklet-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .bookmarklet-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        .btn-bookmarklet {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-bookmarklet:hover {
            background: var(--primary-hover);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .back-link i {
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="header">
                <h1>ブックマークレットの追加</h1>
            </div>

            <div class="instruction">
                下のボタンを、ブラウザの<strong>「ブックマークバー」にドラッグ＆ドロップ</strong>することで追加できます。<br>
                EDINETの検索結果画面で使用することで、データの取得がスムーズになります。
            </div>

            <div class="bookmarklet-item">
                <div class="bookmarklet-name">EDINETへ移動</div>
                <div class="bookmarklet-desc">EDINETの書類検索画面を別タブで開きます。</div>
                <a class="btn-bookmarklet" href="https://disclosure2.edinet-fsa.go.jp/weee0050.aspx"
                    target="_blank">EDINET</a>
            </div>

            <div class="bookmarklet-item">
                <div class="bookmarklet-name">有報全期間</div>
                <div class="bookmarklet-desc">書類種別を「有価証券報告書」、期間を「全期間」に自動設定します。</div>
                <a class="btn-bookmarklet"
                    href='javascript:(function(){var w=setInterval(function(){var b=document.getElementById("BTNCLOSE_SYORUI");if(b){b.click();clearInterval(w);}},200);setTimeout(function(){var r=document.getElementById("vD_SYORUI2");if(r)r.click();},400);setTimeout(function(){var cb=document.getElementById("W0277vCHKSYORUI1");if(cb)cb.click();},800);setTimeout(function(){var k=document.getElementById("BTNCLOSE_KESSAN");if(k)k.click();},1200);setTimeout(function(){var s=document.querySelector("select");if(s)s.value="7";},1600);setTimeout(function(){var t=document.getElementById("vD_TEISYUTUSYA_MEISYOU");if(t)t.focus();},2000);})();'>有報全期間</a>
            </div>

            <div class="bookmarklet-item">
                <div class="bookmarklet-name">有報xbrlDL</div>
                <div class="bookmarklet-desc">リストにある有価証券報告書のXBRLファイルを一括で順次ダウンロードします。</div>
                <a class="btn-bookmarklet"
                    href='javascript:(function(){var rows=[...document.querySelectorAll("table tr")];var targets=[];rows.forEach(r=>{var t=r.innerText;if(t.includes("%E6%9C%89%E4%BE%A1%E8%A8%BC%E5%88%B8%E5%A0%B1%E5%91%8A%E6%9B%B8")&&!t.includes("%E8%A8%82%E6%AD%A3")){var a=[...r.querySelectorAll("a")].find(x=>x.innerText.trim()=="XBRL");if(a)targets.push(a);}});if(!targets.length){alert("%E6%9C%89%E4%BE%A1%E8%A8%BC%E5%88%B8%E5%A0%B1%E5%91%8A%E6%9B%B8%E3%81%AEXBRL%E3%81%8C%E8%A6%8B%E3%81%A4%E3%81%8B%E3%82%8I%E3%81%BE%E3%81%9B%E3%82%93");return;}let i=0;function next(){if(i>=targets.length)return;targets[i].click();i++;setTimeout(next,1500);}next();})();'>有報xbrlDL</a>
            </div>

            <div style="text-align: center;">
                <a href="./" class="back-link">
                    <i class="fas fa-arrow-left"></i> 変換ツールに戻る
                </a>
            </div>
        </div>
    </div>
</body>

</html>
