<!DOCTYPE html>
<html lang="ja">

<head>

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --card-bg: #0f172a;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .page-wrapper {
            display: flex;
            align-items: flex-start;
            /* Changed from center to top */
            justify-content: flex-start;
            /* Changed from center to left */
            min-height: 100vh;
            padding: 60px 40px;
            /* Increased padding */
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: left;
            /* Changed from center to left */
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .instruction {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .bookmarklet-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* Changed from center to left */
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .bookmarklet-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .bookmarklet-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .bookmarklet-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: left;
            /* Changed from center to left */
        }

        .btn-bookmarklet {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-bookmarklet:hover {
            background: var(--primary-hover);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .back-link i {
            margin-right: 8px;
        }

        .footer {
            margin-top: 2rem;
            text-align: left;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* XREA Ad Alignment Fixes */
        body>div:first-child,
        body>center:first-child,
        body>div[align="center"]:first-child,
        center,
        div[align="center"],
        div[style*="text-align: center"] {
            text-align: left !important;
            margin-left: 0 !important;
            margin-right: auto !important;
        }

        /* Specifically align the very first elements (often XREA ads) */
        body>div:first-child,
        body>center:first-child {
            padding-left: 40px !important;
            /* Match page padding */
        }

        /* Ensure images and iframes inside ads are also left-aligned */
        body>div:first-child img,
        body>center:first-child img,
        iframe[id^="google_ads"],
        div[id^="xrea-ad"] {
            margin-left: 0 !important;
            margin-right: auto !important;
            display: inline-block !important;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">

            </div>

            </div>
        </div>
    </div>
    <!-- XREA Ad Alignment Enforcement -->
    <script>
        (function () {
            function forceLeftAlign() {
                const bodyChildren = document.body.children;
                for (let i = 0; i < Math.min(bodyChildren.length, 5); i++) {
                    const el = bodyChildren[i];
                    if (el.classList.contains('page-wrapper')) continue;
                    if (el.tagName === 'CENTER' || el.tagName === 'DIV' || el.getAttribute('align') === 'center') {
                        el.style.textAlign = 'left';
                        el.style.marginLeft = '0';
                        el.style.marginRight = 'auto';
                        el.style.paddingLeft = '40px';
                        el.style.display = 'block';
                        const sub = el.querySelectorAll('img, iframe, div');
                        sub.forEach(s => {
                            s.style.marginLeft = '0';
                            s.style.marginRight = 'auto';
                            s.style.display = 'inline-block';
                        });
                    }
                }
            }
            forceLeftAlign();
            setTimeout(forceLeftAlign, 1000);
            setTimeout(forceLeftAlign, 3000);
            const observer = new MutationObserver(forceLeftAlign);
            observer.observe(document.body, { childList: true });
        })();
    </script>
</body>

</html>
